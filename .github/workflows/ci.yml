name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate config schema
        run: |
          python3 -c "import yaml; yaml.safe_load(open('config.example.yaml'))"

      - name: Validate design system
        run: |
          python3 -c "import yaml; yaml.safe_load(open('design-system/tokens.yaml'))"
          python3 -c "import yaml; yaml.safe_load(open('design-system/components.yaml'))"

      - name: Validate docker-compose
        run: |
          docker compose -f server/docker-compose.yml config --quiet

      - name: Validate SQLite migrations
        run: |
          for f in server/persistence/migrations/*.sql; do
            sqlite3 :memory: < "$f"
            echo "  [OK] $f"
          done

  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get
        continue-on-error: true

      - name: Analyze
        working-directory: mobile
        run: flutter analyze
        continue-on-error: true

  firmware:
    name: Firmware Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check firmware sources exist
        run: |
          test -f firmware/src/usb_audio_capture.c
          test -f firmware/src/ble_audio_stream.c
          test -f firmware/src/ble_sniffer.c
