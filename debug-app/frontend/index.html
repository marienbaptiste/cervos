<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cervos Debug — Streaming STT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header>
      <h1>Cervos Debug — Streaming STT</h1>
      <div style="display:flex;align-items:center;">
        <span class="status-dot pending" id="status-dot"></span>
        <span id="status-text" style="font-size:13px;color:var(--text-secondary);">Checking...</span>
      </div>
    </header>

    <!-- Stream controls -->
    <section>
      <div style="display:flex;align-items:center;gap:16px;">
        <button class="btn btn-record" id="stream-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="8"/>
          </svg>
        </button>
        <div>
          <div id="stream-label" style="font-size:14px;font-weight:500;">Stream</div>
          <div style="font-size:11px;color:var(--text-disabled);">Real-time mic → STT</div>
        </div>

        <canvas id="vu-meter" class="hidden" width="300" height="16"
                style="border-radius:4px;flex:1;"></canvas>

        <div class="toggle-row" style="margin:0;">
          <label class="toggle">
            <input type="checkbox" id="ble-sim">
            <span class="slider"></span>
          </label>
          <span style="font-size:12px;">BLE sim</span>
        </div>

        <button class="btn btn-secondary" id="clear-btn">Clear</button>
      </div>
    </section>

    <!-- Live text -->
    <div id="live-text" class="live-text hidden"></div>

    <!-- Stats bar -->
    <div id="stats-bar" class="stats-bar"></div>

    <!-- Transcripts -->
    <section>
      <h2>Transcripts</h2>
      <div id="transcripts" class="transcripts-list">
        <div style="color:var(--text-disabled);font-size:13px;padding:16px;text-align:center;">
          Hit Stream and start talking
        </div>
      </div>
    </section>

    <!-- File upload (batch fallback) -->
    <section>
      <h2>Batch Mode (file upload)</h2>
      <div style="display:flex;gap:12px;align-items:center;">
        <div class="drop-zone" id="drop-zone" style="flex:1;padding:16px;">
          <div style="font-size:13px;">Drop audio file or click</div>
          <input type="file" id="file-input" accept="audio/*">
        </div>
        <span id="file-name" style="font-size:12px;color:var(--text-secondary);max-width:150px;overflow:hidden;text-overflow:ellipsis;">No file</span>
        <button class="btn btn-primary" id="upload-btn" disabled>Transcribe</button>
      </div>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
