services:
  debug-app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cervos-debug-app
    ports:
      - "8090:8090"
    env_file: .env
    environment:
      - WHISPER_MODEL=large-v3
      - WHISPER_DEVICE=auto
      - WHISPER_COMPUTE_TYPE=float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - model-cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  model-cache:
