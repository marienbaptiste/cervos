# Cervos nRF52840 Dongle — "cervhole headset" (USB) / "cervos dongle" (BLE)
# USB Audio Class speaker + BLE GATT audio streamer

# ---- USB Device ----
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="cervhole headset"
CONFIG_USB_DEVICE_MANUFACTURER="Cervos"
CONFIG_USB_DEVICE_VID=0x1209
CONFIG_USB_DEVICE_PID=0xCE57
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n
# Note: USB is enabled explicitly in usb_audio_init(), not at boot

# ---- USB Audio Class ----
CONFIG_USB_DEVICE_AUDIO=y

# ---- Net buf (required for USB audio data buffers) ----
CONFIG_NET_BUF=y

# ---- Bluetooth ----
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="cervhole dongle"
CONFIG_BT_DEVICE_APPEARANCE=833

# GATT configuration
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_ATT_PREPARE_COUNT=2

# MTU and Data Length Extension for 640-byte audio frames
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_USER_DATA_LEN_UPDATE=y

# TX buffer count — enough for queued notifications
CONFIG_BT_BUF_ACL_TX_COUNT=8
CONFIG_BT_CONN_TX_MAX=8

# ---- Logging ----
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USB_DEVICE_LOG_LEVEL_WRN=y

# ---- C library (newlib needed for Opus alloca/lrint) ----
CONFIG_NEWLIB_LIBC=y

# ---- System (main stack sized for Opus encoding) ----
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=65536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
