# Cervos nRF52840 Dongle
# USB Audio Class speaker + BLE L2CAP CoC audio streamer (LC3 codec)

# ---- USB Device ----
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Cervos Meeting Bridge"
CONFIG_USB_DEVICE_MANUFACTURER="Cervos"
CONFIG_USB_DEVICE_VID=0x1209
CONFIG_USB_DEVICE_PID=0xCE57
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

# ---- USB Audio Class ----
CONFIG_USB_DEVICE_AUDIO=y

# ---- Net buf (required for USB audio + L2CAP) ----
CONFIG_NET_BUF=y

# ---- Bluetooth ----
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Cervos Meeting Bridge"
CONFIG_BT_DEVICE_APPEARANCE=833

# GATT config
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_ATT_PREPARE_COUNT=2

# Data Length Extension — fit 207-byte LC3 packets in single notification
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_USER_DATA_LEN_UPDATE=y

# TX buffer count — enough for queued notifications
CONFIG_BT_BUF_ACL_TX_COUNT=8
CONFIG_BT_CONN_TX_MAX=8

# ---- Settings (NVS for persistent config) ----
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# ---- Reboot support ----
CONFIG_REBOOT=y

# ---- Logging ----
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USB_DEVICE_LOG_LEVEL_WRN=y

# ---- FPU (required for LC3 float operations) ----
CONFIG_FPU=y

# ---- C library (newlib for LC3 math) ----
CONFIG_NEWLIB_LIBC=y

# ---- System (stack sized for LC3 stereo encoding) ----
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=32768
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
