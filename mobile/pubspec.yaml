name: cervos
description: Cervos ambient AI assistant — BLE LC3 audio bridge & spectrogram

publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # BLE (GATT for config, L2CAP CoC via native plugin for audio)
  flutter_reactive_ble: ^5.3.1

  # State management
  flutter_riverpod: ^2.5.1

  # Audio playback — raw PCM buffer output (Oboe/AAudio on Android)
  flutter_pcm_sound: ^1.0.0

  # LC3 decoder: native NDK via platform channel (no pub package needed)
  # See android/app/src/main/cpp/ for liblc3 integration

  # FFT for spectrogram
  fft: ^0.5.1

  # UI
  google_fonts: ^6.1.0
  permission_handler: ^11.3.0

  # Foreground service for background audio streaming
  flutter_foreground_task: ^8.0.0

flutter:
  uses-material-design: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
